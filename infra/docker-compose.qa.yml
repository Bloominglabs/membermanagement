version: "3.9"

services:
  app:
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY}"
      DJANGO_SECURE_SSL_REDIRECT: "1"
      DJANGO_SESSION_COOKIE_SECURE: "1"
      DJANGO_CSRF_COOKIE_SECURE: "1"
      ACCESS_AGENT_API_KEY: "${ACCESS_AGENT_API_KEY}"
      ACCESS_ALLOWLIST_SECRET: "${ACCESS_ALLOWLIST_SECRET}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      FRONTEND_SUCCESS_URL: "${FRONTEND_SUCCESS_URL}"
      FRONTEND_CANCEL_URL: "${FRONTEND_CANCEL_URL}"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports: []
    expose:
      - "8000"
    volumes:
      - static_data:/app/backend/staticfiles
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -"

  worker:
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY}"
      ACCESS_AGENT_API_KEY: "${ACCESS_AGENT_API_KEY}"
      ACCESS_ALLOWLIST_SECRET: "${ACCESS_ALLOWLIST_SECRET}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      FRONTEND_SUCCESS_URL: "${FRONTEND_SUCCESS_URL}"
      FRONTEND_CANCEL_URL: "${FRONTEND_CANCEL_URL}"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

  scheduler:
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY}"
      ACCESS_AGENT_API_KEY: "${ACCESS_AGENT_API_KEY}"
      ACCESS_ALLOWLIST_SECRET: "${ACCESS_ALLOWLIST_SECRET}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      FRONTEND_SUCCESS_URL: "${FRONTEND_SUCCESS_URL}"
      FRONTEND_CANCEL_URL: "${FRONTEND_CANCEL_URL}"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

  caddy:
    image: caddy:2.10
    depends_on:
      - app
    environment:
      DOMAIN: "${DOMAIN}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_data:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  static_data:
  caddy_data:
  caddy_config:
