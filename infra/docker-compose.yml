version: "3.9"

x-app-env: &app-env
  POSTGRES_DB: ${POSTGRES_DB:-membermanagement}
  POSTGRES_USER: ${POSTGRES_USER:-membermanagement}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-membermanagement}
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-membermanagement}
      POSTGRES_USER: ${POSTGRES_USER:-membermanagement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-membermanagement}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    volumes:
      - static_data:/app/backend/staticfiles
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -"

  scheduler:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "config", "beat", "-l", "info"]

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "config", "worker", "-l", "info"]

volumes:
  postgres_data:
  static_data:
